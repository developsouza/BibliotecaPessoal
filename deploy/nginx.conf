# =============================================================
# Nginx — BookLibrary
# Caminho no servidor: /etc/nginx/sites-available/booklibrary
# Ativar: sudo ln -s /etc/nginx/sites-available/booklibrary /etc/nginx/sites-enabled/
# =============================================================

server {
    listen 80;
    server_name biblioteca.g3tsistemas.com.br www.biblioteca.g3tsistemas.com.br;

    # Redireciona HTTP → HTTPS (descomente após rodar o Certbot)
    # return 301 https://biblioteca.g3tsistemas.com.br$request_uri;

    root /var/www/booklibrary/frontend/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Cache para assets estáticos do frontend
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy para a API do backend
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 15M;
    }

    # Proxy para webhooks do Stripe (raw body necessário)
    location /webhook {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Não buffering para garantir raw body ao Stripe
        proxy_request_buffering off;
        client_max_body_size 1M;
    }

    # Proxy para uploads de imagens
    location /uploads/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA — redireciona tudo para o index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

